name: synple
services:
  db:
    env_file:
      - docker.env
    image: postgres
    ports:
     - 5432:5432
    shm_size: 128mb
    volumes:
      - database:/data/db

  registrations:
    build:
      context: .
    command: npm run start:dev registrations
    depends_on:
      - db
    env_file:
      - docker.env
    ports:
      - 3000:3000
    volumes:
      - ./:/user/src/app
volumes:
  database: